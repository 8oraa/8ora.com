<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Bora Özaras</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/nav.css">
  <style>
    .post-hero { padding: 8rem 0 3rem; max-width: 820px; margin: 0 auto; }
    .post-title { font-size: clamp(2rem, 5vw, 3.5rem); margin: 1rem 0; line-height: 1.15; }
    .post-meta { display: flex; align-items: center; gap: 1rem; font-size: 0.85rem; color: var(--text-faint); font-family: var(--font-heading); margin-bottom: 2rem; }
    .post-cover { border-radius: var(--radius-xl); overflow: hidden; margin-bottom: 3rem; aspect-ratio: 16/9; }
    .post-cover img { width: 100%; height: 100%; object-fit: cover; }
    .post-root { max-width: 820px; margin: 0 auto; padding: 0 0 6rem; }
    #blog-post-content { font-size: 1.05rem; line-height: 1.9; color: var(--text-muted); }
    #blog-post-content h1, #blog-post-content h2, #blog-post-content h3 { color: var(--text); font-family: var(--font-heading); margin: 2.5rem 0 1rem; letter-spacing: -0.02em; }
    #blog-post-content h2 { font-size: 1.6rem; }
    #blog-post-content h3 { font-size: 1.25rem; }
    #blog-post-content p { margin-bottom: 1.5rem; }
    #blog-post-content a { color: var(--text); border-bottom: 1px solid var(--border-hover); transition: var(--transition); }
    #blog-post-content a:hover { border-color: var(--text); }
    #blog-post-content strong { color: var(--text); font-weight: 700; }
    #blog-post-content code { background: var(--bg-elevated); padding: 0.15rem 0.45rem; border-radius: 4px; font-family: 'Courier New',monospace; font-size: 0.875em; }
    #blog-post-content blockquote { border-left: 3px solid var(--border-hover); padding-left: 1.5rem; margin: 2rem 0; font-style: italic; color: var(--text-muted); }
    #blog-post-content ul { padding-left: 1.5rem; margin-bottom: 1.5rem; }
    #blog-post-content ul li { list-style: disc; margin-bottom: 0.5rem; }
    .post-nav { display: flex; align-items: center; justify-content: space-between; padding: 2rem 0; border-top: 1px solid var(--border); }
    .post-share-btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.2rem; border-radius: var(--radius-full); border: 1px solid var(--border); font-size: 0.85rem; font-family: var(--font-heading); font-weight: 600; color: var(--text-muted); cursor: pointer; transition: var(--transition); background: transparent; }
    .post-share-btn:hover { border-color: var(--white); color: var(--white); }

    /* ── Related Posts ── */
    .related-posts { margin-top: 4rem; padding-top: 3rem; border-top: 1px solid var(--border); }
    .related-posts-title { font-size: 1.4rem; font-family: var(--font-heading); font-weight: 700; margin-bottom: 1.75rem; color: var(--text); letter-spacing: -0.02em; }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem; }
    .related-card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: var(--transition); text-decoration: none; display: block; }
    .related-card:hover { border-color: var(--border-hover); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
    .related-card-img { aspect-ratio: 16/9; overflow: hidden; background: var(--bg-elevated); }
    .related-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    .related-card:hover .related-card-img img { transform: scale(1.05); }
    .related-card-body { padding: 1rem 1.1rem 1.1rem; }
    .related-card-cat { font-size: 0.7rem; font-family: var(--font-heading); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); margin-bottom: 0.4rem; }
    .related-card-title { font-size: 0.92rem; font-family: var(--font-heading); font-weight: 600; color: var(--text); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .related-card-meta { font-size: 0.75rem; color: var(--text-faint); margin-top: 0.6rem; }

    /* ── Comments ── */
    .comments-section { margin-top: 4rem; padding-top: 3rem; border-top: 1px solid var(--border); }
    .comments-title { font-size: 1.4rem; font-family: var(--font-heading); font-weight: 700; margin-bottom: 1.75rem; color: var(--text); letter-spacing: -0.02em; }
    .comments-list { display: flex; flex-direction: column; gap: 1.25rem; margin-bottom: 2.5rem; }
    .comment-item { display: flex; gap: 1rem; animation: fadeInUp 0.3s ease; }
    .comment-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-elevated); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-weight: 700; font-size: 0.85rem; color: var(--text-muted); flex-shrink: 0; }
    .comment-body { flex: 1; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
    .comment-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
    .comment-author { font-family: var(--font-heading); font-weight: 700; font-size: 0.88rem; color: var(--text); }
    .comment-date { font-size: 0.75rem; color: var(--text-faint); }
    .comment-content { font-size: 0.9rem; color: var(--text-muted); line-height: 1.7; white-space: pre-wrap; }
    .comments-empty { text-align: center; padding: 2rem; color: var(--text-faint); font-size: 0.9rem; }

    /* Comment Form */
    .comment-form-title { font-size: 1.1rem; font-family: var(--font-heading); font-weight: 700; color: var(--text); margin-bottom: 1.25rem; }
    .comment-form { display: flex; flex-direction: column; gap: 1rem; }
    .comment-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .comment-form-row { grid-template-columns: 1fr; } .related-grid { grid-template-columns: 1fr; } }
    .comment-input { width: 100%; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 0.75rem 1rem; color: var(--text); font-family: var(--font-body, inherit); font-size: 0.9rem; transition: var(--transition); outline: none; box-sizing: border-box; }
    .comment-input:focus { border-color: var(--border-hover); }
    .comment-textarea { min-height: 120px; resize: vertical; }
    .comment-submit { align-self: flex-start; padding: 0.65rem 1.5rem; }
    .comment-notice { font-size: 0.78rem; color: var(--text-faint); margin-top: -0.25rem; }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <div class="page-loader"><div class="loader-logo"><span>8</span><span>O</span><span>R</span><span>A</span></div></div>
  <div class="page-transition"></div>
  <div class="scroll-progress"></div>


  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="nav-logo"><div class="logo-box"><span>8</span><span>O</span><span>R</span><span>A</span></div><span class="nav-logo-text">Bora Özaras</span></a>
      <div class="nav-links">
        <a href="/" class="nav-link" data-i18n="nav.home">Ana Sayfa</a>
        <a href="/projects" class="nav-link" data-i18n="nav.projects">Projeler</a>
        <a href="/blog" class="nav-link active" data-i18n="nav.blog">Blog</a>
        <a href="/contact" class="nav-link" data-i18n="nav.contact">İletişim</a>
      </div>
      <div class="nav-controls">
        <div class="lang-toggle"><button class="lang-btn active" data-lang="tr">TR</button><button class="lang-btn" data-lang="en">EN</button></div>
        <button class="nav-theme-toggle" aria-label="Toggle theme">☼</button>
      </div>
      <button class="nav-hamburger"><span></span><span></span><span></span></button>
    </div>
  </nav>
  <div class="mobile-menu">
    <a href="/" class="mobile-link">Ana Sayfa</a>
    <a href="/projects" class="mobile-link">Projeler</a>
    <a href="/blog" class="mobile-link">Blog</a>
    <a href="/contact" class="mobile-link">İletişim</a>
  </div>

  <main class="container">
    <div class="post-root">
      <div class="post-hero" id="post-header">
        <!-- Loaded dynamically -->
        <div style="height:4rem;background:var(--bg-elevated);border-radius:8px;margin-bottom:1rem;animation:loaderPulse 1.5s infinite"></div>
        <div style="height:2rem;background:var(--bg-elevated);border-radius:8px;width:60%;animation:loaderPulse 1.5s infinite"></div>
      </div>
      <article id="blog-post-content">
        <!-- Loaded dynamically -->
      </article>

      <!-- Related Posts -->
      <div class="related-posts" id="related-posts-section" style="display:none">
        <div class="related-posts-title" id="related-posts-heading">Beğenebileceğiniz Diğer Yazılar</div>
        <div class="related-grid" id="related-posts-grid"></div>
      </div>

      <!-- Comments -->
      <div class="comments-section">
        <div class="comments-title">
          <span id="comments-count-label">Yorumlar</span>
        </div>
        <div class="comments-list" id="comments-list">
          <div class="comments-empty" id="comments-empty" style="display:none">Henüz yorum yapılmamış. İlk yorumu sen yap!</div>
        </div>

        <!-- Comment Form -->
        <div class="comment-form-title" id="comment-form-title">Yorum Yap</div>
        <form class="comment-form" id="comment-form" onsubmit="submitComment(event)">
          <div class="comment-form-row">
            <input id="comment-author" class="comment-input" placeholder="Adınız *" required maxlength="100">
            <input id="comment-email" class="comment-input" type="email" placeholder="E-posta (opsiyonel)" maxlength="200">
          </div>
          <textarea id="comment-content" class="comment-input comment-textarea" placeholder="Yorumunuzu yazın..." required maxlength="2000"></textarea>
          <p class="comment-notice" id="comment-notice">Yorumunuz admin onayından sonra yayınlanacaktır.</p>
          <button type="submit" class="btn btn-primary comment-submit" id="comment-submit-btn">💬 Yorum Gönder</button>
        </form>
      </div>

      <div class="post-nav">
        <a href="/blog" class="btn btn-outline" data-i18n="blog.back">← Blog'a Dön</a>
        <button class="post-share-btn" id="share-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          <span data-i18n="blog.share">Paylaş</span>
        </button>
      </div>
    </div><!-- /.post-root -->
  </main>

  <script src="/js/translations.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/blog.js"></script>
</body>
</html>
